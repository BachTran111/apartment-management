<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thêm hợp đồng</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #0f766e;
        --primary-hover: #115e59;
        --border: #dbe3ee;
        --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        background: radial-gradient(circle at top, #e6fffb 0, var(--bg) 45%);
        color: var(--text);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .page {
        max-width: 760px;
        margin: 0 auto;
      }

      .card {
        background: var(--card);
        border: 1px solid rgba(219, 227, 238, 0.9);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 28px;
      }

      .eyebrow {
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 12px;
        color: var(--primary);
        font-weight: 700;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
      }
      p {
        margin: 0 0 24px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .field.full {
        grid-column: 1 / -1;
      }

      label {
        font-weight: 600;
        font-size: 14px;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        font: inherit;
        background: #fff;
        color: var(--text);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 8px;
      }

      .btn {
        border: 0;
        border-radius: 12px;
        padding: 12px 18px;
        font-weight: 700;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--primary-hover);
      }

      .btn-secondary {
        background: #eef2f7;
        color: var(--text);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }

      @media (max-width: 720px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .actions {
          flex-direction: column-reverse;
        }
        .actions .btn,
        .actions a {
          width: 100%;
          justify-content: center;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <p class="eyebrow">Hợp đồng</p>
        <h1>Thêm hợp đồng</h1>
        <p>Form này khớp trực tiếp với payload của API tạo hợp đồng.</p>

        <form id="contractForm" action="/api/contracts" method="POST">
          <div class="grid">
            <div class="field">
              <label for="nguoi_thue_id">Người thuê</label>
              <select id="nguoi_thue_id" name="nguoi_thue_id" required>
                <option value="">Đang tải người thuê...</option>
              </select>
              <span class="hint">Danh sách này lấy từ API người thuê.</span>
            </div>

            <div class="field">
              <label for="can_ho_id">Căn hộ</label>
              <select id="can_ho_id">
                <option value="">Đang tải căn hộ...</option>
              </select>
              <span class="hint"
                >Chọn căn hộ trước để nạp danh sách phòng.</span
              >
            </div>

            <div class="field">
              <label for="phong_id">Phòng</label>
              <select id="phong_id" name="phong_id" required disabled>
                <option value="">Chọn căn hộ trước</option>
              </select>
              <span class="hint"
                >Danh sách phòng được nạp theo căn hộ đã chọn.</span
              >
            </div>

            <div class="field">
              <label for="ngay_bat_dau">Ngày bắt đầu</label>
              <input
                type="date"
                id="ngay_bat_dau"
                name="ngay_bat_dau"
                required
              />
            </div>

            <div class="field">
              <label for="ngay_ket_thuc">Ngày kết thúc</label>
              <input
                type="date"
                id="ngay_ket_thuc"
                name="ngay_ket_thuc"
                required
              />
            </div>

            <div class="field">
              <label for="tien_dat_coc">Tiền đặt cọc</label>
              <input
                type="number"
                id="tien_dat_coc"
                name="tien_dat_coc"
                min="0"
                step="1000"
                placeholder="Ví dụ: 5000000"
                required
              />
            </div>

            <div class="field">
              <label for="trang_thai">Trạng thái</label>
              <select id="trang_thai" name="trang_thai">
                <option value="active">active</option>
                <option value="expired">expired</option>
                <option value="terminated">terminated</option>
              </select>
            </div>

            <div class="field full">
              <label for="ghi_chu">Ghi chú</label>
              <textarea
                id="ghi_chu"
                name="ghi_chu"
                placeholder="Ghi chú thêm cho hợp đồng (không bắt buộc)"
              ></textarea>
            </div>
          </div>

          <div class="actions">
            <a class="btn btn-secondary" href="./ContractList.html">Quay lại</a>
            <button class="btn btn-primary" type="submit">Lưu hợp đồng</button>
          </div>
          <div id="formMessage" class="hint" aria-live="polite"></div>
        </form>
      </section>
    </main>
    <script src="./js/contractForm.js"></script>
  </body>
</html>
