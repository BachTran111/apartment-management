<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chỉnh sửa hợp đồng</title>
    <link rel="stylesheet" href="./css/contract-action-form.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="card">
        <a class="back-link" id="backLink" href="./ContractDetail.html"
          >← Về chi tiết hợp đồng</a
        >
        <p class="eyebrow">Hợp đồng</p>
        <h1 id="pageTitle">Chỉnh sửa hợp đồng</h1>
        <p class="page-note" id="pageNote">
          Đang tải dữ liệu hợp đồng để chỉnh sửa...
        </p>

        <form id="editForm">
          <div class="grid">
            <div class="field">
              <label for="edit_tenant_id">Người thuê</label>
              <select id="edit_tenant_id" name="nguoi_thue_id" required>
                <option value="">Đang tải người thuê...</option>
              </select>
            </div>

            <div class="field">
              <label for="edit_apartment_id">Căn hộ</label>
              <select id="edit_apartment_id" name="can_ho_id">
                <option value="">Đang tải căn hộ...</option>
              </select>
            </div>

            <div class="field">
              <label for="edit_room_id">Phòng</label>
              <select id="edit_room_id" name="phong_id" required disabled>
                <option value="">Chọn căn hộ trước</option>
              </select>
            </div>

            <div class="field">
              <label for="edit_start_date">Ngày bắt đầu</label>
              <input
                type="date"
                id="edit_start_date"
                name="ngay_bat_dau"
                required
              />
            </div>

            <div class="field">
              <label for="edit_end_date">Ngày kết thúc</label>
              <input
                type="date"
                id="edit_end_date"
                name="ngay_ket_thuc"
                required
              />
            </div>

            <div class="field">
              <label for="edit_deposit">Tiền đặt cọc</label>
              <input
                type="number"
                id="edit_deposit"
                name="tien_dat_coc"
                min="0"
                step="1000"
                placeholder="Ví dụ: 5000000"
                required
              />
            </div>

            <div class="field">
              <label for="edit_status">Trạng thái</label>
              <select id="edit_status" name="trang_thai">
                <option value="active">active</option>
                <option value="expired">expired</option>
                <option value="terminated">terminated</option>
              </select>
            </div>

            <div class="field full">
              <label for="edit_note">Ghi chú</label>
              <textarea
                id="edit_note"
                name="ghi_chu"
                placeholder="Ghi chú thêm cho hợp đồng (không bắt buộc)"
              ></textarea>
            </div>
          </div>

          <div class="actions">
            <a
              class="btn btn-secondary"
              id="cancelLink"
              href="./ContractList.html"
              >Quay lại</a
            >
            <button class="btn btn-primary" type="submit" id="saveButton">
              Lưu thay đổi
            </button>
          </div>
          <div id="editFormMessage" class="message" aria-live="polite"></div>
        </form>
      </section>
    </main>
    <script src="./js/contract-edit.js"></script>
  </body>
</html>
