<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Ký - Quản Lý Căn Hộ</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS (reuse login styles) -->
    <link rel="stylesheet" href="css/login-style.css" />
  </head>
  <body>
    <div class="login-container">
      <!-- Left Panel -->
      <div class="login-panel login-panel-left">
        <div class="illustration">
          <div class="building-icon">
            <i class="fas fa-user-check"></i>
          </div>
          <h2>Tạo Tài Khoản</h2>
          <p class="subtitle">Đăng ký để truy cập hệ thống quản lý căn hộ</p>
          <div class="features">
            <div class="feature-item">
              <i class="fas fa-check-circle"></i>
              <span>Đăng ký hoàn toàn miễn phí</span>
            </div>
            <div class="feature-item">
              <i class="fas fa-check-circle"></i>
              <span>Không cần thẻ tín dụng</span>
            </div>
            <div class="feature-item">
              <i class="fas fa-check-circle"></i>
              <span>Bảo mật thông tin cao</span>
            </div>
            <div class="feature-item">
              <i class="fas fa-check-circle"></i>
              <span>Hỗ trợ 24/7</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Panel - Register Form -->
      <div class="login-panel login-panel-right">
        <div class="form-wrapper">
          <div class="logo-section">
            <div class="logo">
              <i class="fas fa-user-plus"></i>
            </div>
            <h1>Đăng Ký</h1>
            <p class="welcome-text">Tạo tài khoản mới</p>
          </div>

          <!-- Alert Messages -->
          <div id="alertContainer"></div>

          <!-- Register Form -->
          <form id="registerForm" class="login-form">
            <div class="form-group">
              <label for="email">
                <i class="fas fa-envelope"></i>
                Email
              </label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                placeholder="Nhập email của bạn"
                required
              />
              <small class="error-text" id="emailError"></small>
            </div>

            <div class="form-group">
              <label for="fullName">
                <i class="fas fa-user"></i>
                Họ và Tên
              </label>
              <input
                type="text"
                id="fullName"
                name="fullName"
                class="form-control"
                placeholder="Nhập họ và tên"
                required
              />
              <small class="error-text" id="fullNameError"></small>
            </div>

            <div class="form-group">
              <label for="password">
                <i class="fas fa-lock"></i>
                Mật khẩu
              </label>
              <div class="password-input-group">
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-control"
                  placeholder="Tối thiểu 6 ký tự"
                  required
                />
                <button
                  type="button"
                  class="btn-toggle-password"
                  id="togglePassword"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <small class="error-text" id="passwordError"></small>
              <div class="password-strength" id="passwordStrength"></div>
            </div>

            <div class="form-group">
              <label for="confirmPassword">
                <i class="fas fa-lock"></i>
                Xác nhận mật khẩu
              </label>
              <div class="password-input-group">
                <input
                  type="password"
                  id="confirmPassword"
                  name="confirmPassword"
                  class="form-control"
                  placeholder="Nhập lại mật khẩu"
                  required
                />
                <button
                  type="button"
                  class="btn-toggle-password"
                  id="toggleConfirmPassword"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <small class="error-text" id="confirmPasswordError"></small>
            </div>

            <div class="form-check terms-section">
              <input
                type="checkbox"
                id="agreeTerms"
                name="agreeTerms"
                class="form-check-input"
                required
              />
              <label class="form-check-label" for="agreeTerms">
                Tôi đồng ý với
                <a href="#" class="terms-link">Điều khoản dịch vụ</a>
                và
                <a href="#" class="terms-link">Chính sách riêng tư</a>
              </label>
            </div>
            <small class="error-text" id="termsError"></small>

            <button type="submit" class="btn-login">
              <span id="btnText">Tạo Tài Khoản</span>
              <i class="fas fa-arrow-right" id="btnIcon"></i>
            </button>
          </form>

          <!-- Divider -->
          <div class="divider-section">
            <span>Đã có tài khoản?</span>
          </div>

          <!-- Login Link -->
          <button type="button" class="btn-register" id="btnLogin">
            <i class="fas fa-sign-in-alt"></i>
            Quay lại đăng nhập
          </button>

          <!-- Footer -->
          <div class="login-footer">
            <p>&copy; 2024 Quản Lý Căn Hộ. Tất cả quyền được bảo lưu.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading Spinner Modal -->
    <div class="loading-modal" id="loadingModal">
      <div class="spinner"></div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/register.js"></script>
  </body>
</html>
