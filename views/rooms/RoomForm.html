<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chỉnh sửa phòng - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./css/RoomList.css" />
    <style>
        .form-grid {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1.5px dashed var(--line);
        }

        .btn-cancel {
            background: #fff;
            color: var(--line);
        }

        .table-header-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
        }
    </style>
</head>

<body data-api-base="" data-can-ho-id="" data-phong-id="">
    <main class="room-page">
        <section class="room-shell">
            <header class="topbar">
                <div class="brand">
                    <button class="icon-button" type="button" aria-label="Mo menu">
                        <span></span><span></span><span></span>
                    </button>
                    <div>
                        <p class="eyebrow">Phòng</p>
                        <h1>Quản lý căn hộ</h1>
                    </div>
                </div>
                <button class="profile-button" type="button" aria-label="Tai khoan">
                    <span></span>
                </button>
            </header>

            <section class="panel">
                <div class="section-heading">
                    <h2 id="formTitle">Chỉnh sửa phòng</h2>
                </div>

                <form id="roomForm">
                    <div class="form-grid">

                        <div class="filter-block">
                            <label for="soPhong">Tên phòng:</label>
                            <div class="input-wrap">
                                <input id="soPhong" type="text" placeholder="Nhập tên phòng" required />
                            </div>
                        </div>

                        <div class="filter-block">
                            <label for="giaThue">Giá thuê</label>
                            <div class="input-wrap">
                                <input id="giaThue" type="number" placeholder="Nhập giá tiền" required />
                            </div>
                        </div>

                        <div class="filter-block">
                            <label for="trangThai">Tình trạng</label>
                            <select id="trangThai" required>
                                <option value="Phòng Trống">Phòng Trống</option>
                                <option value="Đang Có Người Ở">Đang Có Người Ở</option>
                                <option value="Đang Bảo Trì">Đang Bảo Trì</option>
                                <option value="Không Sử Dụng">Không Sử Dụng</option>
                            </select>
                        </div>

                        <div class="filter-block">
                            <label for="dienTich">Diện tích (m2)</label>
                            <div class="input-wrap">
                                <input id="dienTich" type="number" step="0.1" placeholder="Nhập diện tích" required />
                            </div>
                        </div>

                        <div class="filter-block">
                            <label for="nguoiThue">Người thuê</label>
                            <select id="nguoiThue">
                                <option value="">-- Chọn người thuê --</option>
                            </select>
                        </div>

                        <div class="filter-block">
                            <label for="anhPhong">Ảnh phòng</label>
                            <input id="anhPhong" type="file" accept="image/*" />
                            <img id="anhPreview" src="" alt="Preview"
                                style="display:none; max-width: 200px; margin-top: 10px; border: 1.5px solid var(--line);">
                        </div>

                        <div class="filter-block">
                            <label for="hopDong">Nhập hợp đồng</label>
                            <select id="hopDong">
                                <option value="">-- Chọn hợp đồng --</option>
                            </select>
                        </div>

                    </div>

                    <div class="table-header-action">
                        <div class="section-heading" style="margin: 0;">
                            <h2>Nội thất hiện có</h2>
                        </div>
                        <button type="button" class="add-button" id="btnAddNoiThat"
                            style="height: 36px; font-size: 0.8rem; padding: 0 16px;">
                            + Thêm nội thất
                        </button>
                    </div>

                    <div class="table-card" style="margin-top: 16px;">
                        <table class="room-table">
                            <thead>
                                <tr>
                                    <th>Tên thiết bị</th>
                                    <th>Số lượng</th>
                                    <th>Tình trạng</th>
                                    <th style="width: 80px; text-align: center;">Xóa</th>
                                </tr>
                            </thead>
                            <tbody id="noiThatTableBody">
                                <tr>
                                    <td colspan="4" class="table-message">Chưa có nội thất nào.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="add-button btn-cancel" id="btnCancel">Hủy</button>
                        <button type="submit" class="add-button" id="btnSubmit">Xác nhận</button>
                    </div>

                </form>
            </section>
        </section>
    </main>

    <script src="./js/RoomForm.js"></script>
</body>

</html>
