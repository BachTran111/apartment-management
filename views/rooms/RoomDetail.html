<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết phòng</title>
    <link rel="stylesheet" href="./css/RoomDetail.css" />
  </head>
  <body data-api-base="" data-can-ho-id="">
    <main class="detail-page">
      <section class="detail-shell">
        <header class="detail-header">
          <div class="title-block">
            <a class="back-link" href="../dashboard/Dashboard.html">← Về dashboard</a>
            <div class="title-wrap">
              <h1 id="roomTitle">Chi tiết phòng</h1>
            </div>
            <p class="page-note" id="detailNotice"></p>
          </div>

          <div class="header-actions">
            <button class="ghost-button" type="button" id="backToListButton">
              ← Quay lại danh sách
            </button>
            <button class="primary-button" type="button">
              Chỉnh sửa phòng
            </button>
          </div>
        </header>

        <section class="summary-grid" id="summaryGrid"></section>

        <section class="content-grid">
          <div class="content-main">
            <article class="card tenant-card">
              <div class="card-head">
                <div class="title-wrap small-gap">
                  <h2>Thông tin người thuê</h2>
                </div>
                <button class="detail-link" type="button" id="tenantDetailButton">
                  Xem chi tiết
                </button>
              </div>
              <div class="tenant-grid" id="tenantInfo"></div>
            </article>

            <article class="card contract-card">
              <div class="title-wrap small-gap">
                <h2>Lịch sử hợp đồng</h2>
              </div>
              <div class="table-scroll">
                <table class="history-table">
                  <thead>
                    <tr>
                      <th>Người thuê</th>
                      <th>Thời gian</th>
                      <th>Loại</th>
                      <th>Trạng thái</th>
                    </tr>
                  </thead>
                  <tbody id="historyBody"></tbody>
                </table>
              </div>
            </article>
          </div>

          <aside class="content-side">
            <article class="card inventory-card">
              <div class="title-wrap small-gap">
                <h2>Danh sách nội thất</h2>
              </div>
              <div class="inventory-list" id="inventoryList"></div>
            </article>

            <article class="card gallery-card">
              <div class="title-wrap small-gap">
                <h2>Hình ảnh phòng</h2>
              </div>
              <div class="gallery-grid" id="galleryGrid"></div>
            </article>
          </aside>
        </section>
      </section>
    </main>

    <script src="./js/RoomDetail.js"></script>
  </body>
</html>
