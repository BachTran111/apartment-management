<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết hóa đơn | Admin Dashboard</title>
    <link rel="stylesheet" href="./css/invoice-detail.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="detail-container">
      <h1 class="page-title">Chi tiết hóa đơn</h1>

      <div class="card">
        <div class="form-group">
          <label for="invoiceName">Tên hóa đơn</label>
          <input
            type="text"
            id="invoiceName"
            class="form-control"
            value="Hóa đơn tiền điện tháng 4"
            disabled
          />
        </div>

        <div class="form-group">
          <label for="invoiceType">Loại hóa đơn</label>
          <input
            type="text"
            id="invoiceType"
            class="form-control"
            value="Điện"
            disabled
          />
        </div>

        <div class="form-group">
          <label for="invoiceAmount">Số tiền</label>
          <input
            type="text"
            id="invoiceAmount"
            class="form-control"
            value="500.000 ₫"
            disabled
          />
        </div>

        <div class="form-group">
          <label for="invoiceDate">Ngày tạo</label>
          <input
            type="text"
            id="invoiceDate"
            class="form-control"
            value="2026-04-01"
            disabled
          />
        </div>

        <div class="form-group">
          <label for="invoiceStatus">Trạng thái</label>
          <input
            type="text"
            id="invoiceStatus"
            class="form-control"
            value="Đã thanh toán"
            disabled
          />
        </div>

        <div class="button-section">
          <button id="backBtn" class="btn btn-secondary">Quay lại</button>
        </div>
      </div>
    </div>

    <script src="./js/invoice-detail.js"></script>
  </body>
</html>
