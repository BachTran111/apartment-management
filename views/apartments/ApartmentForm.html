<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chỉnh sửa căn hộ - Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f4f7f6;
        margin: 0;
        padding: 20px;
        color: #333;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        background: #fff;
        padding: 30px;
        border: 1px solid #ddd;
      }

      .page-header {
        border-bottom: 1px solid #ddd;
        padding-bottom: 15px;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .page-title {
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .page-title i {
        color: #f39c12;
      }

      .form-section-title {
        color: #f39c12;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 20px;
      }

      .form-section-title span {
        background: #f39c12;
        color: #fff;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        margin-right: 8px;
      }

      .form-box {
        border: 1px solid #ddd;
        padding: 25px;
        border-radius: 4px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .form-group label span {
        color: red;
      }

      .form-control {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        box-sizing: border-box;
      }

      .form-control:focus {
        outline: none;
        border-color: #f39c12;
      }

      .form-control.is-invalid {
        border-color: red;
      }

      textarea.form-control {
        min-height: 100px;
        resize: vertical;
      }

      .error-text {
        color: #f39c12;
        font-size: 12px;
        margin-top: 5px;
        display: none;
        align-items: center;
        gap: 5px;
      }

      .error-text::before {
        content: "▲";
        font-size: 10px;
      }

      /* Hộp cảnh báo lỗi tổng hợp */
      .validation-box {
        border: 1px solid red;
        background-color: #fffafb;
        padding: 15px;
        margin-top: 20px;
        display: none;
      }

      .validation-title {
        color: red;
        font-weight: 700;
        font-size: 13px;
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      .validation-list {
        margin: 0;
        padding-left: 20px;
        color: red;
        font-size: 13px;
      }

      .action-buttons {
        display: flex;
        gap: 15px;
        margin-top: 20px;
      }

      .btn {
        flex: 1;
        padding: 12px;
        font-weight: 700;
        font-size: 13px;
        text-transform: uppercase;
        border: 1px solid #333;
        cursor: pointer;
        text-align: center;
      }

      .btn-submit {
        background-color: #000;
        color: #fff;
      }

      .btn-cancel {
        background-color: #fff;
        color: #333;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="page-header">
        <div class="page-title">
          <i class="fa-solid fa-minus"></i> QUẢN LÝ CĂN HỘ
        </div>
        <a href="apartment-list.html" style="color: #666"
          ><i class="fa-regular fa-circle-xmark"></i
        ></a>
      </div>

      <div class="form-section-title" id="mainTitle">
        <span>1</span> CHỈNH SỬA CĂN HỘ
      </div>

      <div class="form-box">
        <form id="apartmentForm">
          <div class="form-group">
            <label>Tên căn hộ: <span>*</span></label>
            <input
              type="text"
              id="tenCanHo"
              class="form-control"
              placeholder="Chung cư Sunrise Building"
            />
            <div class="error-text" id="errTen">Tên căn hộ là bắt buộc</div>
          </div>

          <div class="form-group">
            <label>Địa chỉ: <span>*</span></label>
            <input
              type="text"
              id="diaChi"
              class="form-control"
              placeholder="123 Đường Nguyễn Văn A, Quận 1, TP.HCM"
            />
            <div class="error-text" id="errDiaChi">Địa chỉ là bắt buộc</div>
          </div>

          <div class="form-group">
            <label>Tổng số phòng: <span>*</span></label>
            <input
              type="number"
              id="tongSoPhong"
              class="form-control"
              placeholder="10"
              min="1"
            />
            <div class="error-text" id="errTongSoPhong">
              Tổng số phòng là bắt buộc và phải ít nhất là 1
            </div>
          </div>

          <div class="form-group">
            <label>Số điện thoại:</label>
            <input
              type="text"
              id="soDienThoai"
              class="form-control"
              placeholder="0901234567"
            />
            <div class="error-text" id="errPhone">
              Số điện thoại phải đúng định dạng (nếu có)
            </div>
          </div>

          <div class="form-group">
            <label>Email:</label>
            <input
              type="text"
              id="email"
              class="form-control"
              placeholder="contact@sunrise.com"
            />
            <div class="error-text" id="errEmail">
              Email phải đúng định dạng (nếu có)
            </div>
          </div>

          <div class="form-group">
            <label>Ghi chú:</label>
            <textarea
              id="ghiChu"
              class="form-control"
              placeholder="Nhập ghi chú về căn hộ..."
            ></textarea>
          </div>

          <div class="validation-box" id="validationBox">
            <div class="validation-title">
              <span>10</span> KIỂM TRA DỮ LIỆU ĐẦU VÀO:
            </div>
            <ul class="validation-list" id="validationList"></ul>
          </div>

          <div class="action-buttons">
            <button type="submit" class="btn btn-submit">LƯU THAY ĐỔI</button>
            <button type="button" class="btn btn-cancel" id="btnCancel">
              HỦY
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/ApartmentForm.js"></script>
  </body>
</html>
